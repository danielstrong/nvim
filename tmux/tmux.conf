# bind -N "Split pane vertically" V split-window -b -h -c "#{pane_current_path}"
# bind -N "Split pane horizontally" n split-window -v -c "#{pane_current_path}"
# bind -N "Split pane horizontally" N split-window -b -v -c "#{pane_current_path}"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind-key -N "Break Pane" , break-pane
bind-key -N "Send Pane to Window" . command-prompt -p "Send pane to window: "  "join-pane -t :'%%'"
bind-key -N "Send Window to Session" > command-prompt -p "Send window to session: "  "move-window -t '%%':"
#bind-key -N "Find Window" s command-prompt "find-window -Z -- '%%'"
#bind-key    -T prefix       ,                    command-prompt -I "#W" "rename-window -- '%%'"
#bind-key    -T prefix       .                    command-prompt -T "move-window -t '%%'"

# ==========
#  Copy Mode
# ==========
unbind -n MouseDrag1Pane
bind -n MouseDrag1Pane select-pane

bind -N "Search Down" '/'  copy-mode \; command-prompt -T search -p "(search down)" { send-keys -X search-forward "%%" }
bind -N "Search Up" '?'    copy-mode \; command-prompt -T search -p "(search up)" { send-keys -X search-backward "%%" }

bind -N "Paste contents from buffer" p paste-buffer

bind -N "Copy Mode" g copy-mode
bind -N "Copy Mode down" j copy-mode\; send-keys -X cursor-down
bind -N "Copy Mode up" k copy-mode\; send-keys -X cursor-up
bind -N "Copy Mode left" h copy-mode\; send-keys -X cursor-left
bind -N "Copy Mode right" l copy-mode\; send-keys -X cursor-right
bind -N "Copy Mode half page down" d copy-mode\; send-keys -X halfpage-down
bind -N "Copy Mode half page up" u copy-mode\; send-keys -X halfpage-up
bind -N "Half Page Down" -T copy-mode-vi d send-keys -X halfpage-down
bind -N "Half Page Up" -T copy-mode-vi u send-keys -X halfpage-up

bind -N "Visual Mode" v copy-mode\; send-keys -X begin-selection
bind -N "Visual Line Mode" V copy-mode\; send-keys -X select-line
bind -N "Visual Rectangle Mode" C-v copy-mode\; send-keys -X begin-selection\; send-keys -X rectangle-toggle
bind -N "Visual Word Mode"  C-s copy-mode\; send-keys -X select-word
bind -N "Toggle Visual Mode" -T copy-mode-vi v send-keys -X begin-selection
bind -N "Toggle Visual Line Mode" -T copy-mode-vi V send-keys -X select-line
bind -N "Toggle Visual Rectangle Mode" -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -N "Toggle Visual Word Mode" -T copy-mode-vi C-s send-keys -X select-word


# ==========
#  Settings
# ==========
#set-option status off
#set-environment -g FZF_TMUX 1  # supposed to make fzf show in a tmux pane doesnt seem to work here
set -g mouse on
setw -g aggressive-resize off
setw -g mode-keys vi
set -g status-keys vi
#set -g status-keys emacs
set -g base-index 1
set -wg pane-base-index 1

set -g display-time 2000 # tmux message dispaly duraiton
set -g display-panes-time 2000
setw -g monitor-activity on
setw -g activity-action none
setw -g renumber-windows on
set -g visual-activity off
set -g visual-bell off
set -g focus-events on
#set -g bell-action none

set -g status-interval 30 #frequency in seconds to refresh status panel

