# https://github.com/samoshkin/tmux-config/blob/master/tmux/tmux.conf

# ==========
#  System
# ==========
bind -N "localleader prefix" \\ switch-client -T localleader
bind -N "Copy CWD to clipboard" -T localleader Y run-shell 'tmux set-buffer "#{pane_current_path}" ; echo -n "#{pane_current_path}" | pbcopy ; tmux display "Copied: #{pane_current_path}"'
bind -N "Toggle Mouse" -T localleader c set-option mouse
bind -N "Toggle Status bar" -T localleader f set-option status
bind -N "Display info" -T localleader g display "Terminal: #{client_termname} "
bind -N "Show a clock" -T localleader a clock-mode
bind -N "Lookup key" "'" command-prompt -k -p key "list-keys -1N \"%%%\""
bind -N "List keys" '"' list-keys -N
#bind -N "Refresh Client"   R                    refresh-client
bind -N "Edit Tmux Config" - new-window -n "tmux.conf" bash -c 'vim ~/.config/tmux/tmux.conf && tmux source ~/.config/tmux/tmux.conf'
bind -N "Reload Tmux Config" + source-file ~/.config/tmux/powerline-theme.conf 
bind -N "Reload Tmux Config" _ source-file ~/.config/tmux/tmux.conf 

# ==========
#  Sessions
# ==========
bind -N "Session prefix" e switch-client -T sessionleader
bind -N "Kill Session" -T sessionleader x confirm-before -p "kill session #S? (y/n)" "kill-session"
bind -N "Select Next Session" -T sessionleader -r l switch-client -n
bind -N "Select Next Session" -T sessionleader -r j switch-client -n
bind -N "Select Next Session" -T sessionleader -r h switch-client -p
bind -N "Select Next Session" -T sessionleader -r k switch-client -p
bind -N "Select Session 1" -n M-1 select-window -t 1
bind -N "Select Session 2" -n M-2 select-window -t 2
bind -N "Select Session 3" -n M-3 select-window -t 3
bind -N "Select Session 4" -n M-4 select-window -t 4
bind -N "Select Session 5" -n M-5 select-window -t 5
bind -N "Select Session 6" -n M-6 select-window -t 6
bind -N "Select Session 7" -n M-7 select-window -t 7
bind -N "Select Session 8" -n M-8 select-window -t 8
bind -N "Choose a session from a list" s choose-tree -ZsK '#{?#{e|<:#{line},9},#{e|+:1,#{line}},#{?#{e|<:#{line},35},M-#{a:#{e|+:97,#{e|-:#{line},9}}},}}'
bind -N "Open Session or Start Session" S run-shell "tmux neww ~/.config/tmux/create-session.sh"
bind -N "Detach the current client" D detach-client
bind -N "Rename Session" R command-prompt -I "#S" "rename-session -- '%%'"

# ==========
#  Windows
# ==========
bind -N "Tab prefix" t switch-client -T tableader
bind -N "Select Next Window" -T tableader -r l next-window
bind -N "Select Next Window" -T tableader -r j next-window
bind -N "Select Prev Window" -T tableader -r h previous-window
bind -N "Select Prev Window" -T tableader -r k previous-window
bind -N "Swap Window Next" -T tableader -r 'L' 'swap-window -t +1;select-window -t +1'
bind -N "Swap Window Prev" -T tableader -r 'H' 'swap-window -t -1;select-window -t -1'
bind -N "Swap Window Next" -T tableader -r 'J' 'swap-window -d -t +1'
bind -N "Swap Window Prev" -T tableader -r 'K' 'swap-window -d -t -1'
bind -N "Kill Window" -T tableader x confirm-before -p "kill window #I (#W)? (y/n)" "kill-window"
bind -N "Swap Window Prev" -r '{' 'swap-window -d -t -1'
bind -N "Swap Window Next" -r '}' 'swap-window -d -t +1'
bind -N "Select Window 1" -n F1 select-window -t 1
bind -N "Select Window 2" -n F2 select-window -t 2
bind -N "Select Window 3" -n F3 select-window -t 3
bind -N "Select Window 4" -n F4 select-window -t 4
bind -N "Select Window 5" -n F5 select-window -t 5
bind -N "Select Window 6" -n F6 select-window -t 6
bind -N "Select Window 7" -n F7 select-window -t 7
bind -N "Select Window 8" -n F8 select-window -t 8
bind -N "Change to last window" K last-window
bind -N "Create Window at session root" c new-window -c "#{pane_current_path}"
bind -N "Create Window at current" C new-window 
bind -N "Toggle between smallest and largest window sizes if window visible in multilpe places" F set -w window-size
bind -N "Rename Window" r command-prompt -p "Rename Window: " "rename-window \"%%\""

# ==========
#  Panes
# ==========
bind -N "Window prefix" w switch-client -T windowleader
bind -N "Select pane above" -T windowleader -r k select-pane -U
bind -N "Select pane below" -T windowleader -r j select-pane -D
bind -N "Select pane left" -T windowleader -r h select-pane -L
bind -N "Select pane right" -T windowleader -r l select-pane -R
bind -N "Swap pane above" -T windowleader -r K swap-pane -U
bind -N "Swap pane below" -T windowleader -r J swap-pane -D
bind -N "Swap pane left" -T windowleader -r H swap-pane -U
bind -N "Swap pane right" -T windowleader -r L swap-pane -D
bind -N "Swap Pane with First Pane" -T windowleader n if '[ #{pane_index} -eq 1 ]' 'swap-pane -s "!"' 'select-pane -t:.1 ; swap-pane -d -t 1 -s "!"'
bind -N "Split pane horizontally" -T windowleader s split-window -v -c "#{pane_current_path}"
bind -N "Split pane vertically" -T windowleader S split-window -h -c "#{pane_current_path}"
bind -N "Split pane vertically" -T windowleader v split-window -h -c "#{pane_current_path}"
bind -N "Kill Pane" -T windowleader x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind -N "Swap pane prev" -r '[' swap-pane -U
bind -N "Swap pane next" -r ']' swap-pane -D
bind -N "Select Pane 1" -n C-F1 select-pane -t 1
bind -N "Select Pane 2" -n C-F2 select-pane -t 2
bind -N "Select Pane 3" -n C-F3 select-pane -t 3
bind -N "Select Pane 4" -n C-F4 select-pane -t 4
bind -N "Select Pane 5" -n C-F5 select-pane -t 5
bind -N "Select Pane 6" -n C-F6 select-pane -t 6
bind -N "Select Pane 7" -n C-F7 select-pane -t 7
bind -N "Select Pane 8" -n C-F8 select-pane -t 8
bind -N "Select pane above" -r "up" select-pane -U
bind -N "Select pane below" -r "down" select-pane -D
bind -N "Select pane left" -r "left" select-pane -L
bind -N "Select pane right" -r "right" select-pane -R
bind -N "Select Pane by number"  q display-panes -d 0
bind -N "Change to last pane" J last-pane
bind -N "Resize pane up" -r C-k resize-pane -U 5
bind -N "Resize pane down" -r C-j resize-pane -D 5
bind -N "Resize pane left" -r C-h  resize-pane -L 5
bind -N "Resize pane right" -r C-l  resize-pane -R 5
bind -N "Resize pane up" -r C-up resize-pane -U 5
bind -N "Resize pane down" -r C-down resize-pane -D 5
bind -N "Resize pane left" -r C-left  resize-pane -L 5
bind -N "Resize pane right" -r C-right  resize-pane -R 5
bind -N "Spread panes out evenly" C-Space select-layout -E
bind -N "Spread panes out evenly" "=" select-layout -E
